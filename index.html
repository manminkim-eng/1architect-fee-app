        function App() {
          const reportRef = useRef(null);

          const [projectName, setProjectName] = useState('만민 건축사 신사옥 신축공사 설계용역');
          const [costInput, setCostInput] = useState('1600000000');
          const [taskType, setTaskType] = useState('design'); 
          const [buildingUsage, setBuildingUsage] = useState(ARCHITECT_USAGES[7].name); 
          const [docLevel, setDocLevel] = useState(1); 
          const [layoutType, setLayoutType] = useState('MOBILE');
          const [isSpecialEquipment, setIsSpecialEquipment] = useState(false);
          const [isExporting, setIsExporting] = useState(false);

          // 추가 할증 인증 상태
          const [isRemodel, setIsRemodel] = useState(false);
          const [isBF, setIsBF] = useState(false);
          const [certGreen, setCertGreen] = useState(0);
          const [certIntelligent, setCertIntelligent] = useState(0);
          const [certZero, setCertZero] = useState(0);
          const [certEnergy, setCertEnergy] = useState(0);

          const [result, setResult] = useState(null);

          const formatNumber = (num) => num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");

          const handleCostChange = (e) => {
            const value = e.target.value.replace(/[^0-9]/g, '');
            setCostInput(value);
          };

          const currentUsageObj = ARCHITECT_USAGES.find(u => u.name === buildingUsage);
          const currentType = currentUsageObj ? currentUsageObj.type : 'type2';

          const calculateFees = () => {
            let rawCost = parseFloat(costInput);
            if (isNaN(rawCost) || rawCost <= 0) { setResult(null); return; }

            let targetCost = rawCost;
            let currentTable = taskType === 'design' ? ARCHITECT_DESIGN : ARCHITECT_SUPERVISION;
            let currentTypeKey = 'type2'; 
            let selectedLevelName = '보통(제2종)';
            let getRate;

            if (currentUsageObj) {
              currentTypeKey = currentUsageObj.type;
              let isUpgraded = false;
              if (isSpecialEquipment) {
                if (currentTypeKey === 'type1') { currentTypeKey = 'type2'; isUpgraded = true; }
                else if (currentTypeKey === 'type2') { currentTypeKey = 'type3'; isUpgraded = true; }
              }
              selectedLevelName = currentTypeKey === 'type1' ? '단순(제1종)' : currentTypeKey === 'type2' ? '보통(제2종)' : '복잡(제3종)';
              if (isUpgraded) selectedLevelName += ' (특수설비 상향적용)';
            }
            
            if (taskType === 'design') {
              getRate = (entry) => entry[currentTypeKey][docLevel];
              const docLevelText = docLevel === 0 ? '기본' : docLevel === 1 ? '중급' : '상급';
              selectedLevelName += ` (${docLevelText} 도서)`;
            } else {
              getRate = (entry) => entry[currentTypeKey];
            }

            // 요율 구간 직선보간법 산출
            let r_y1 = 0, r_y2 = 0, r_x2 = 0, r_x1 = 0, finalRate = 0;
            let isInterpolated = false;

            if (targetCost <= currentTable[0].cost) {
              finalRate = getRate(currentTable[0]);
              r_x2 = currentTable[0].cost; r_x1 = currentTable[0].cost;
              r_y1 = finalRate; r_y2 = finalRate;
            } else if (targetCost >= currentTable[currentTable.length - 1].cost) {
              finalRate = getRate(currentTable[currentTable.length - 1]);
              r_x2 = currentTable[currentTable.length - 1].cost; r_x1 = currentTable[currentTable.length - 1].cost;
              r_y1 = finalRate; r_y2 = finalRate;
            } else {
              for (let i = 0; i < currentTable.length - 1; i++) {
                const c1 = currentTable[i].cost;
                const c2 = currentTable[i + 1].cost;
                if (targetCost > c1 && targetCost <= c2) {
                  const r1 = getRate(currentTable[i]);
                  const r2 = getRate(currentTable[i + 1]);
                  r_x2 = c1; r_x1 = c2; r_y1 = r1; r_y2 = r2;
                  if (targetCost === c2) {
                    finalRate = r2;
                  } else {
                    const interpolated = r1 - ((targetCost - c1) * (r1 - r2)) / (c2 - c1);
                    finalRate = Math.round(interpolated * 1000) / 1000;
                    isInterpolated = true;
                  }
                  break;
                }
              }
            }

            // 설계 세부 조정 합산 (체감 공식 및 실비정액)
            let totalAdjustmentRate = 0;
            let appliedAdjustmentNames = [];
            let bfNote = '';

            if (taskType === 'design') {
              // 리모델링 등 일반 비율 적용 (중복 체감 미대상인 경우 합산)
              if (isRemodel) {
                totalAdjustmentRate += 50;
                appliedAdjustmentNames.push(`리모델링(+50%)`);
              }

              // 인증별 복합 요율 처리 (체감 공식 적용 대상: 녹색, 지능형, 에너지/제로)
              let certRates = [];
              if (certGreen > 0) certRates.push({ name: '녹색건축', rate: certGreen });
              if (certIntelligent > 0) certRates.push({ name: '지능형', rate: certIntelligent });
              if (certZero > 0) {
                certRates.push({ name: '제로에너지', rate: certZero });
              } else if (certEnergy > 0) {
                certRates.push({ name: '에너지효율', rate: certEnergy });
              }

              if (certRates.length > 0) {
                // 내림차순 정렬 (최상위값 A, 차상위값 B, 최하위값 C)
                certRates.sort((a, b) => b.rate - a.rate);
                
                let combinedRate = 0;
                let certNoteParts = [];

                certRates.forEach((cert, idx) => {
                  let denominator = idx === 0 ? 1 : (idx === 1 ? 2 : 3);
                  // 체감공식 산식 적용 및 소수점 2째 자리 반올림
                  let appliedRate = Math.round((cert.rate / denominator) * 100) / 100; 
                  combinedRate += appliedRate;
                  certNoteParts.push(`${cert.name}(+${appliedRate}%)`);
                });

                totalAdjustmentRate += combinedRate;
                appliedAdjustmentNames.push(`인증체감합산[${certNoteParts.join(', ')}]`);
              }

              // BF 인증 실비정액가산 안내 (요율에 미합산)
              if (isBF) {
                bfNote = '장애물 없는 생활환경(BF) 인증비용은 실비정액가산식으로 별도 산정(본 대가에 미포함)';
              }
            }

            // 부동소수점 오류 방지
            totalAdjustmentRate = Math.round(totalAdjustmentRate * 100) / 100;

            const rawBaseFee = targetCost * (finalRate / 100);
            const baseFee = Math.floor(rawBaseFee / 1000) * 1000;
            const adjustmentAmount = Math.floor((baseFee * (totalAdjustmentRate / 100)) / 1000) * 1000;
            const finalFee = baseFee + adjustmentAmount;
            let basisSource = `건축사의 업무범위와 대가기준 [별표${taskType === 'design' ? '4' : '5'}]`;

            setResult({
              targetCost, finalRate: finalRate.toFixed(3),
              r_x2, r_x1, r_y1, r_y2,
              isInterpolated, baseFee,
              adjustmentRate: totalAdjustmentRate,
              adjustmentAmount, appliedAdjustmentNames, bfNote,
              finalFee, basisSource, selectedLevelName
            });
          };

          // 의존성 배열에 세부 인증 상태 모두 추가
          useEffect(() => { 
            calculateFees(); 
          }, [costInput, taskType, buildingUsage, docLevel, isSpecialEquipment, isRemodel, isBF, certGreen, certIntelligent, certZero, certEnergy]);

          // 감리로 변경 시 설계 추가 조건 리셋
          useEffect(() => { 
            if (taskType === 'supervision') {
              setIsRemodel(false);
              setIsBF(false);
              setCertGreen(0);
              setCertIntelligent(0);
              setCertZero(0);
              setCertEnergy(0);
            }
          }, [taskType]);

          const exportToImage = async (format) => {
            if (!reportRef.current) return;
            setIsExporting(true);
            try {
              await document.fonts.ready;
              await new Promise(r => setTimeout(r, 150));

              const node = reportRef.current;
              const scale = 3;

              let dataUrl;
              if (format === 'png') {
                dataUrl = await window.domtoimage.toPng(node, {
                  width: node.offsetWidth * scale,
                  height: node.offsetHeight * scale,
                  style: {
                    transform: `scale(${scale})`,
                    transformOrigin: 'top left',
                    width: node.offsetWidth + 'px',
                    height: node.offsetHeight + 'px',
                  },
                  fontFamily: "'Noto Sans KR', sans-serif",
                });
              } else {
                const canvas = await window.html2canvas(node, {
                  scale: scale,
                  useCORS: true,
                  allowTaint: true,
                  backgroundColor: layoutType === 'MOBILE' ? '#0f172a' : '#ffffff',
                  logging: false,
                  imageTimeout: 0,
                  onclone: (clonedDoc) => {
                    const allElements = clonedDoc.querySelectorAll('*');
                    allElements.forEach(el => {
                      el.style.fontFamily = "'Noto Sans KR', sans-serif";
                    });
                  }
                });
                dataUrl = canvas.toDataURL('image/jpeg', 1.0);
              }

              const link = document.createElement('a');
              link.href = dataUrl;
              link.download = `산출내역_${projectName}_${layoutType}.${format}`;
              link.click();
            } catch (err) {
              console.error("이미지 저장 실패:", err);
              alert("저장 중 오류가 발생했습니다. 콘솔을 확인해주세요.");
            } finally {
              setIsExporting(false);
            }
          };

          return (
            <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-800">
              <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                {/* === 왼쪽: 설정 패널 === */}
                <div className="lg:col-span-5 space-y-4">
                  <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 space-y-7">
                    <h2 className="text-xl font-extrabold flex items-center text-slate-800 border-b border-slate-100 pb-4">
                      <Settings className="w-6 h-6 mr-2 text-blue-600"/>
                      공공기관 설계·감리비 산출
                    </h2>

                    <div className="space-y-3">
                      <label className="block text-sm font-bold text-slate-700">출력물 양식 선택</label>
                      <div className="grid grid-cols-2 gap-3">
                        <button onClick={() => setLayoutType('A4')} className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all ${layoutType === 'A4' ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-slate-100 bg-white text-slate-500 hover:border-slate-300'}`}>
                          <FileText className="w-8 h-8 mb-2" />
                          <span className="font-bold text-sm">A4 규격 (보고서용)</span>
                        </button>
                        <button onClick={() => setLayoutType('MOBILE')} className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all ${layoutType === 'MOBILE' ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-slate-100 bg-white text-slate-500 hover:border-slate-300'}`}>
                          <Smartphone className="w-8 h-8 mb-2" />
                          <span className="font-bold text-sm">모바일 규격 (영상용)</span>
                        </button>
                      </div>
                    </div>

                    <div className="space-y-2">
                      <label className="block text-sm font-bold text-slate-700">용역명 (프로젝트명)</label>
                      <input type="text" value={projectName} onChange={(e) => setProjectName(e.target.value)}
                        className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium text-slate-700"/>
                    </div>

                    <div className="space-y-2">
                      <label className="block text-sm font-bold text-slate-700">예정 공사비 (원)</label>
                      <div className="relative">
                        <input type="text" value={formatNumber(costInput)} onChange={handleCostChange}
                          className="w-full pl-4 pr-12 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-right font-black text-xl text-blue-700" placeholder="0"/>
                        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">원</span>
                      </div>
                    </div>

                    <div className="space-y-2">
                      <label className="block text-sm font-bold text-slate-700">업무 종류</label>
                      <div className="flex bg-slate-100 p-1.5 rounded-xl">
                        <button onClick={() => setTaskType('design')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${taskType === 'design' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>설계 (Design)</button>
                        <button onClick={() => setTaskType('supervision')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${taskType === 'supervision' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>공사감리 (Supervision)</button>
                      </div>
                    </div>

                    <div className="space-y-2 animate-fadeIn">
                      <label className="block text-sm font-bold text-slate-700">건축물 용도 [별표 3]</label>
                      <select value={buildingUsage} onChange={(e) => { setBuildingUsage(e.target.value); const selected = ARCHITECT_USAGES.find(u => u.name === e.target.value); if (selected && selected.type === 'type3') setIsSpecialEquipment(false); }}
                        className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium">
                        <optgroup label="■ 제1종 (단순)">{ARCHITECT_USAGES.filter(u => u.type === 'type1').map(u => <option key={u.name} value={u.name}>{u.name}</option>)}</optgroup>
                        <optgroup label="■ 제2종 (보통)">{ARCHITECT_USAGES.filter(u => u.type === 'type2').map(u => <option key={u.name} value={u.name}>{u.name}</option>)}</optgroup>
                        <optgroup label="■ 제3종 (복잡)">{ARCHITECT_USAGES.filter(u => u.type === 'type3').map(u => <option key={u.name} value={u.name}>{u.name}</option>)}</optgroup>
                      </select>
                      {currentType !== 'type3' && (
                        <label className="flex items-start mt-3 cursor-pointer bg-amber-50 p-3 rounded-xl border border-amber-200 hover:bg-amber-100 transition-colors">
                          <input type="checkbox" checked={isSpecialEquipment} onChange={(e) => setIsSpecialEquipment(e.target.checked)} className="mr-2 mt-0.5 w-4 h-4 text-amber-600 focus:ring-amber-500 border-gray-300 rounded shrink-0"/>
                          <span className="text-[12px] font-bold text-amber-800 tracking-tight leading-snug">
                            {currentType === 'type1' ? '※ 제1종 시설로서 공기조화 설비 등 특수설비를 요하는 시설은 제2종을 적용' : '※ 제2종 시설로서 특수구조 또는 공기조화 설비 등 특수설비를 요하는 시설은 제3종을 적용'}
                          </span>
                        </label>
                      )}
                    </div>

                    {taskType === 'design' && (
                      <>
                        <div className="space-y-2 animate-fadeIn">
                          <label className="block text-sm font-bold text-slate-700">도서작성 수준 [별표 4]</label>
                          <div className="flex bg-slate-100 p-1.5 rounded-xl">
                            {['기본', '중급', '상급'].map((level, idx) => (
                              <button key={idx} onClick={() => setDocLevel(idx)} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${docLevel === idx ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>{level}</button>
                            ))}
                          </div>
                        </div>

                        {/* ★ 세부 조정 및 다중 인증 처리 섹션 */}
                        <div className="space-y-3 animate-fadeIn pt-4 border-t border-slate-100">
                          <label className="block text-sm font-bold text-slate-700 flex items-center mb-3">
                            <PlusCircle className="w-4 h-4 mr-1 text-indigo-500"/>
                            설계 대가 세부 조정 및 인증 (가산요율)
                          </label>
                          
                          {/* 1. 체크박스 영역 (리모델링 및 BF인증) */}
                          <div className="flex flex-wrap gap-4 mb-4 pb-4 border-b border-slate-50">
                            <label className="flex items-center cursor-pointer bg-white border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50 transition-colors">
                              <input type="checkbox" checked={isRemodel} onChange={(e) => setIsRemodel(e.target.checked)} className="mr-2 w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"/>
                              <span className="text-[13px] font-bold text-slate-700">리모델링 (대수선 등) +50%</span>
                            </label>
                            <label className="flex items-center cursor-pointer bg-white border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50 transition-colors">
                              <input type="checkbox" checked={isBF} onChange={(e) => setIsBF(e.target.checked)} className="mr-2 w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"/>
                              <span className="text-[13px] font-bold text-slate-700">BF 인증 (실비정액가산)</span>
                            </label>
                          </div>

                          {/* 2. 체감 공식 적용 인증 드롭다운 4종 */}
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[11px] font-bold text-slate-500 mb-1">녹색건축 인증</label>
                              <select value={certGreen} onChange={(e) => setCertGreen(Number(e.target.value))} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-[13px] font-medium text-slate-700">
                                {GREEN_OPTIONS.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                              </select>
                            </div>
                            <div>
                              <label className="block text-[11px] font-bold text-slate-500 mb-1">지능형건축물(IBS) 인증</label>
                              <select value={certIntelligent} onChange={(e) => setCertIntelligent(Number(e.target.value))} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-[13px] font-medium text-slate-700">
                                {IBS_OPTIONS.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                              </select>
                            </div>
                            <div>
                              <label className="block text-[11px] font-bold text-slate-500 mb-1">제로에너지 인증</label>
                              <select value={certZero} onChange={(e) => {
                                const val = Number(e.target.value);
                                setCertZero(val);
                                if (val > 0) setCertEnergy(0); // 제로에너지 선택 시 중복 방지
                              }} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-[13px] font-medium text-slate-700">
                                {ZERO_OPTIONS.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                              </select>
                            </div>
                            <div>
                              <label className="block text-[11px] font-bold text-slate-500 mb-1 flex justify-between">
                                에너지효율등급 인증 {certZero > 0 && <span className="text-red-500 font-bold ml-1">(제로에너지 중복불가)</span>}
                              </label>
                              <select value={certEnergy} onChange={(e) => setCertEnergy(Number(e.target.value))} disabled={certZero > 0} 
                                className={`w-full p-2 border rounded-lg outline-none text-[13px] font-medium transition-colors ${certZero > 0 ? 'bg-red-50 border-red-200 text-red-400 cursor-not-allowed' : 'bg-slate-50 border-slate-200 text-slate-700 focus:ring-2 focus:ring-indigo-500'}`}>
                                {certZero > 0 ? <option value="0">적용 불가 (제로에너지 우선적용)</option> : ENERGY_OPTIONS.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                              </select>
                            </div>
                          </div>
                        </div>
                      </>
                    )}
                    
                    {/* ★ 저장 버튼: PNG(고품질) */}
                    <div className="flex gap-2 mt-6">
                      <button onClick={() => exportToImage('png')} disabled={isExporting}
                        className="flex-1 bg-slate-900 hover:bg-blue-600 disabled:opacity-50 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:shadow-xl transition-all flex items-center justify-center transform hover:-translate-y-0.5">
                        <Download className="w-5 h-5 mr-2" />
                        {isExporting ? '저장 중...' : 'PNG 저장'}
                      </button>
                    </div>
                  </div>
                </div>

                {/* === 오른쪽: 출력물 미리보기 패널 === */}
                <div className="lg:col-span-7 overflow-x-auto pb-12 flex justify-center items-start">
                  {result && (
                    layoutType === 'A4' ? (
                      /* ===== A4 규격 출력물 ===== */
                      <div ref={reportRef} className="print-area bg-white shadow-2xl flex flex-col overflow-hidden"
                        style={{ width: '794px', height: '1123px', padding: '60px 70px', boxSizing: 'border-box', fontFamily: "'Noto Sans KR', sans-serif" }}>
                        
                        <div style={{ textAlign: 'left', marginBottom: '24px', borderBottom: '2px solid black', paddingBottom: '16px', paddingLeft: '8px' }}>
                          <h1 style={{ fontSize: '28px', fontWeight: '800', color: 'black', letterSpacing: '-0.5px' }}>
                            {taskType === 'design' ? '설계 용역비 산출서' : '감리 용역비 산출서'}
                          </h1>
                        </div>

                        <div style={{ marginBottom: '20px', paddingLeft: '8px' }}>
                          <h2 style={{ fontSize: '17px', fontWeight: '700', marginBottom: '8px', display: 'flex', alignItems: 'center', color: 'black' }}>
                            <span style={{ marginRight: '8px' }}>●</span> 예정 공사비
                          </h2>
                          <div style={{ paddingLeft: '24px', fontSize: '15px', fontWeight: '700', color: 'black' }}>
                            {formatNumber(result.targetCost)} <span style={{ fontSize: '14px', fontWeight: '400', color: '#374151' }}>원 VAT(별도)</span>
                          </div>
                        </div>

                        <div style={{ marginBottom: '20px', paddingLeft: '8px' }}>
                          <h2 style={{ fontSize: '17px', fontWeight: '700', marginBottom: '8px', display: 'flex', alignItems: 'flex-end', color: 'black', gap: '8px' }}>
                            <span>●</span> 적용근거
                            <span style={{ fontSize: '13px', color: '#6b7280', fontWeight: '400' }}>[국토교통부 고시 제 2020-635호, 2020.09.14 적용]</span>
                          </h2>
                          <div style={{ paddingLeft: '24px', color: 'black', fontWeight: '500', lineHeight: '1.8', fontSize: '14px' }}>
                            {result.basisSource} 적용.<br/>
                            <span style={{ color: '#374151' }}>- 적용 난이도 : {result.selectedLevelName} ({buildingUsage})</span>
                            {result.appliedAdjustmentNames.length > 0 && (
                              <span style={{ color: '#4338ca', fontWeight: '700', display: 'block', fontSize: '13px', marginTop: '4px' }}>
                                - 세부 할증 적용 : {result.appliedAdjustmentNames.join(', ')} (총 +{result.adjustmentRate}%)
                              </span>
                            )}
                          </div>
                        </div>

                        <div style={{ marginBottom: '16px', paddingLeft: '8px', flex: 1 }}>
                          <h2 style={{ fontSize: '17px', fontWeight: '700', marginBottom: '12px', display: 'flex', alignItems: 'center', color: 'black' }}>
                            <span style={{ marginRight: '8px' }}>●</span> {taskType === 'design' ? '설계' : '감리'}용역비 산출내역
                          </h2>
                          <div style={{ paddingLeft: '24px' }}>
                            {/* 최종 산출금액 */}
                            <div style={{ display: 'flex', alignItems: 'center', marginBottom: '12px', backgroundColor: '#f9fafb', border: '1px solid #d1d5db', padding: '12px', borderRadius: '2px', whiteSpace: 'nowrap' }}>
                              <span style={{ color: 'black', fontWeight: '700', marginRight: '16px', fontSize: '14px' }}>최종 산출금액 : </span>
                              <span style={{ fontSize: '20px', fontWeight: '800', color: '#1e40af', marginRight: '8px' }}>{formatNumber(result.finalFee)}</span>
                              <span style={{ fontSize: '15px', fontWeight: '700', color: 'black' }}>원 <span style={{ fontSize: '13px', fontWeight: '400' }}>VAT(별도)</span></span>
                            </div>

                            <table style={{ width: '100%', borderCollapse: 'collapse', border: '2px solid black', fontSize: '12px', color: 'black', tableLayout: 'fixed' }}>
                              <colgroup>
                                <col style={{ width: '20%' }} />
                                <col style={{ width: '25%' }} />
                                <col style={{ width: '55%' }} />
                              </colgroup>
                              <tbody>
                                {/* 구분 영역 - 용역명 */}
                                <tr style={{ borderBottom: '1px solid black' }}>
                                  <td rowSpan={result.adjustmentRate > 0 ? 4 : 2} style={{ backgroundColor: '#f3f4f6', fontWeight: '700', borderRight: '1px solid black', textAlign: 'center', verticalAlign: 'middle', padding: '10px 8px', wordBreak: 'keep-all' }}>구 분</td>
                                  <td style={{ backgroundColor: '#f9fafb', fontWeight: '700', borderRight: '1px solid black', textAlign: 'center', verticalAlign: 'middle', padding: '10px 8px', wordBreak: 'keep-all' }}>용 역 명</td>
                                  <td style={{ fontWeight: '700', textAlign: 'center', verticalAlign: 'middle', padding: '10px 8px' }}>{projectName}</td>
                                </tr>

                                {result.adjustmentRate > 0 ? (
                                  <>
                                    <tr style={{ borderBottom: '1px solid black' }}>
                                      <td style={{ backgroundColor: '#f9fafb', fontWeight: '700', borderRight: '1px solid black', textAlign: 'center', verticalAlign: 'middle', padding: '10px 8px', wordBreak: 'keep-all' }}>기본 용역비</td>
                                      <td style={{ fontWeight: '700', color: '#374151', textAlign: 'center', verticalAlign: 'middle', padding: '10px 8px' }}>{formatNumber(result.baseFee)} 원</td>
                                    </tr>
                                    <tr style={{ borderBottom: '1px solid black' }}>
                                      <td style={{ backgroundColor: '#eef2ff', fontWeight: '700', color: '#3730a3', borderRight: '1px solid black', textAlign: 'center', verticalAlign: 'middle', padding: '10px 8px', wordBreak: 'keep-all' }}>세부 조정액 (+{result.adjustmentRate}%)</td>
                                      <td style={{ fontWeight: '700', color: '#4338ca', textAlign: 'center', verticalAlign: 'middle', padding: '10px 8px' }}>{formatNumber(result.adjustmentAmount)} 원</td>
                                    </tr>
                                    <tr style={{ borderBottom: '1px solid black' }}>
                                      <td style={{ backgroundColor: '#eff6ff', fontWeight: '800', borderRight: '1px solid black', textAlign: 'center', verticalAlign: 'middle', padding: '10px 8px', wordBreak: 'keep-all' }}>최종 용역비</td>
                                      <td style={{ backgroundColor: '#eff6ff', fontWeight: '800', color: '#1d4ed8', fontSize: '14px', textAlign: 'center', verticalAlign: 'middle', padding: '10px 8px' }}>{formatNumber(result.finalFee)} 원</td>
                                    </tr>
                                  </>
                                ) : (
                                  <tr style={{ borderBottom: '1px solid black' }}>
                                    <td style={{ backgroundColor: '#f9fafb', fontWeight: '700', borderRight: '1px solid black', textAlign: 'center', verticalAlign: 'middle', padding: '10px 8px', wordBreak: 'keep-all' }}>용 역 비</td>
